name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java: [ '21' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build sentinel-bom and sentinel-core
        run: mvn --batch-mode --no-transfer-progress install -pl sentinel-bom,sentinel-core

      - name: Run sentinel-core tests
        run: mvn --batch-mode --no-transfer-progress test -pl sentinel-core

      - name: Verify sentinel-spring-boot (compile only, no runtime Spring context needed)
        run: mvn --batch-mode --no-transfer-progress compile -pl sentinel-spring-boot/sentinel-spring-boot-autoconfigure,sentinel-spring-boot/sentinel-spring-boot-starter -am
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-${{ matrix.java }}
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Check for hardcoded secrets
        run: |
          # Fail if any obvious secret patterns exist in source files
          if grep -rE "(api_key|apikey|password|secret|token)\s*=\s*['\"][^'\"]{8,}" \
            --include="*.java" --include="*.yaml" --include="*.yml" \
            --exclude-dir=".git" --exclude-dir="target" .; then
            echo "Potential hardcoded secret detected"
            exit 1
          fi
          echo "No hardcoded secrets found"

      - name: Check no .onnx model files committed
        run: |
          if find . -name "*.onnx" -not -path "./.git/*" | grep -q .; then
            echo "ONNX model files should not be committed"
            exit 1
          fi
          echo "No ONNX model files found"
